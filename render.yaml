databases:
  - name: lightaudit-db
    plan: free
    databaseName: lightaudit
    user: lightauditadmin

services:
  - type: keyvalue
    name: lightaudit-redis
    plan: free
    ipAllowList: []

  - type: web
    name: lightaudit
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn config.asgi:application -k uvicorn_worker.UvicornWorker --bind 0.0.0.0:$PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ADMIN_URL
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: lightaudit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lightaudit-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: lightaudit-redis
          property: connectionString
      - key: DJANGO_AWS_ACCESS_KEY_ID
        sync: false
      - key: DJANGO_AWS_SECRET_ACCESS_KEY
        sync: false
      - key: DJANGO_AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: DJANGO_AWS_S3_REGION_NAME
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: DJANGO_DEFAULT_FROM_EMAIL
        sync: false
      - key: DJANGO_SERVER_EMAIL
        sync: false

  - type: worker
    name: lightaudit-celeryworker
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "celery -A config.celery_app worker -l INFO"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ADMIN_URL
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lightaudit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lightaudit-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: lightaudit-redis
          property: connectionString
      - key: DJANGO_AWS_ACCESS_KEY_ID
        sync: false
      - key: DJANGO_AWS_SECRET_ACCESS_KEY
        sync: false
      - key: DJANGO_AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: DJANGO_AWS_S3_REGION_NAME
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false

  - type: worker
    name: lightaudit-celerybeat
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "celery -A config.celery_app beat -l INFO"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ADMIN_URL
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lightaudit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lightaudit-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: lightaudit-redis
          property: connectionString
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
